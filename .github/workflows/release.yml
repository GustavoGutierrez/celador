name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing version tag to release or republish (for example v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            git fetch --tags --force
            git rev-parse "$TAG" >/dev/null 2>&1 || {
              echo "Tag ${TAG} does not exist on the repository." >&2
              exit 1
            }
            git checkout "$TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          case "$TAG" in
            v*) ;;
            *)
              echo "Release tags must start with 'v'. Got: $TAG" >&2
              exit 1
              ;;
          esac

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify CLI entrypoint
        run: go list ./cmd/celador

      - name: Remove existing release assets for reruns
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          if ! gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release $TAG does not exist yet; nothing to clean up."
            exit 0
          fi

          for asset in \
            "checksums.txt" \
            "celador_${VERSION}_linux_amd64.tar.gz" \
            "celador_${VERSION}_darwin_arm64.tar.gz" \
            "celador_${VERSION}_windows_amd64.zip"
          do
            gh release delete-asset "$TAG" "$asset" --repo "${GITHUB_REPOSITORY}" --yes || true
          done

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew-tap:
    name: Publish Homebrew tap repository
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download checksums from GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          gh release download "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "checksums.txt" \
            --output "$RUNNER_TEMP/checksums.txt" \
            --clobber

      - name: Verify tap publishing configuration
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN}" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN is required to publish Formula/celador.rb to GustavoGutierrez/homebrew-celador." >&2
            echo "Create a fine-grained token with Contents: Read and write on the tap repository and save it as a repository secret." >&2
            exit 1
          fi

          gh repo view "GustavoGutierrez/homebrew-celador" >/dev/null

      - name: Render Homebrew formula
        env:
          VERSION: ${{ needs.release.outputs.version }}
          CHECKSUMS_FILE: ${{ runner.temp }}/checksums.txt
          OUTPUT_FILE: ${{ runner.temp }}/celador.rb
        run: |
          python3 scripts/render_homebrew_formula.py \
            --template packaging/homebrew/Formula/celador.rb \
            --version "$VERSION" \
            --checksums-file "$CHECKSUMS_FILE" \
            --output "$OUTPUT_FILE"

      - name: Validate rendered formula syntax
        env:
          FORMULA_FILE: ${{ runner.temp }}/celador.rb
        run: ruby -c "$FORMULA_FILE"

      - name: Checkout tap repository
        uses: actions/checkout@v6
        with:
          repository: GustavoGutierrez/homebrew-celador
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-celador

      - name: Publish tap repository contents
        env:
          TAG: ${{ needs.release.outputs.tag }}
          FORMULA_FILE: ${{ runner.temp }}/celador.rb
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "homebrew-celador/Formula"
          cp packaging/homebrew/README.md "homebrew-celador/README.md"
          cp packaging/homebrew/RELEASE_PROCESS.md "homebrew-celador/RELEASE_PROCESS.md"
          cp "$FORMULA_FILE" "homebrew-celador/Formula/celador.rb"

          git -C "homebrew-celador" add README.md RELEASE_PROCESS.md Formula/celador.rb

          if git -C "homebrew-celador" diff --cached --quiet; then
            echo "Homebrew tap repository already up to date"
            exit 0
          fi

          git -C "homebrew-celador" \
            -c user.name='github-actions[bot]' \
            -c user.email='41898282+github-actions[bot]@users.noreply.github.com' \
            commit -m "Update Celador Homebrew formula for $TAG"

          git -C "homebrew-celador" push origin HEAD
